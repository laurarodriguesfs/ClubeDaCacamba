<!DOCTYPE html>
<html lang="en">

<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Clube Da Caçamba</title>
	<link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">

	<!-- CSS  -->
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
	<link href="css/materialize.css" type="text/css" rel="stylesheet" media="screen,projection" />
	<link href="css/style.css" type="text/css" rel="stylesheet" media="screen,projection" />
	<link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet" />
</head>

<body>
	<div id="navbar" class="navbar-fixed-top"></div>
	<div id="criandoProj">
		<p class="voltar">
			<i class="material-icons">arrow_back</i>
			Voltar ao Gerenciador
		</p>

		<h1>Criação de Novo Projeto</h1>
		<form>
			<div class="projInput">
				<label>Titulo do Projeto</label>
				<input type="text" name="titulo" placeholder="Ex: Projeto A que constitue em ..." required>

				<label>Descrição Curta</label>
				<div id="editor"></div>

			</div>
		</form>

	</div>
	<a href="https://www.instagram.com/clubedacacamba.uel/" target="_blank" id="botao-mascote" class="botao-mascote-fixo">
		<img src="images/Caçambinha.png" alt="Siga nosso Instagram!">
	</a>
	<div id="footer"></div>

	<!--  Scripts-->
	<script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
	<script src="https://code.jquery.com/jquery-2.1.1.min.js"></script>
	<script src="js/materialize.js"></script>
	<script src="js/init.js"></script>
	<script src="js/main.js" defer type="module"></script>
	<script>
		const quill = new Quill('#editor', {
			theme: 'snow'
		});
	</script>

</body>

</html>
